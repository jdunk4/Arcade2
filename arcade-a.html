  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

       GAME BOY POCKET-STYLE CONTROLLER
       Portrait slab: ~0.72W x 1.30H x 0.14D (m units)
       Buttons animate (color + Z press) on gamepad input,
       keyed to the same wineKeyMap as the original code.
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <m-group id="controller-root" y="1.05" z="0.58" rx="-8">

    <!-- BODY -->

    <!-- Silver edge trim -->
    <m-cube x="0"     y="0.645"  z="0.072" width="0.72"  height="0.018" depth="0.006" color="#b8b8bc"></m-cube>
    <m-cube x="0"     y="-0.645" z="0.072" width="0.72"  height="0.018" depth="0.006" color="#b8b8bc"></m-cube>
    <m-cube x="-0.36" y="0"      z="0.072" width="0.018" height="1.264" depth="0.006" color="#b8b8bc"></m-cube>
    <m-cube x="0.36"  y="0"      z="0.072" width="0.018" height="1.264" depth="0.006" color="#b8b8bc"></m-cube>

    <!-- SCREEN -->
    <!-- Silver bezel surround -->
    <m-cube x="0" y="0.24" z="0.075" width="0.638" height="0.596" depth="0.012" color="#909296"></m-cube>
    <!-- Black screen panel -->
    <m-cube x="0" y="0.24" z="0.082" width="0.58"  height="0.54"  depth="0.008" color="#050508"></m-cube>
    <!-- Glass glint streaks -->
    <m-cube x="-0.15" y="0.42" z="0.09" width="0.12"  height="0.018" depth="0.002" color="#ddeeff"></m-cube>
    <m-cube x="-0.18" y="0.36" z="0.09" width="0.018" height="0.09"  depth="0.002" color="#ddeeff"></m-cube>

    <!-- D-PAD (lower left) — each arm is its own element for per-direction animation -->
    <!-- Horizontal arms -->
    <m-cube id="btn-dpad-left"  x="-0.228" y="-0.21"  z="0.090" width="0.072" height="0.062" depth="0.028" color="#707078"></m-cube>
    <m-cube id="btn-dpad-right" x="-0.156" y="-0.21"  z="0.090" width="0.072" height="0.062" depth="0.028" color="#707078"></m-cube>
    <!-- Vertical arms -->
    <m-cube id="btn-dpad-up"    x="-0.192" y="-0.175" z="0.090" width="0.062" height="0.072" depth="0.028" color="#707078"></m-cube>
    <m-cube id="btn-dpad-down"  x="-0.192" y="-0.247" z="0.090" width="0.062" height="0.072" depth="0.028" color="#707078"></m-cube>
    <!-- Center hub -->
    <m-cube x="-0.192" y="-0.21" z="0.095" width="0.062" height="0.062" depth="0.018" color="#888890"></m-cube>

    <!-- FACE BUTTONS — diamond cluster (lower right) -->
    <!-- A = top -->
    <m-sphere id="btn-a" x="0.200" y="-0.155" z="0.095" radius="0.030" color="#cc2222"></m-sphere>
    <!-- B = right -->
    <m-sphere id="btn-b" x="0.245" y="-0.210" z="0.095" radius="0.030" color="#1aaa5c"></m-sphere>
    <!-- X = left -->
    <m-sphere id="btn-x" x="0.155" y="-0.210" z="0.095" radius="0.030" color="#2244cc"></m-sphere>
    <!-- Y = bottom -->
    <m-sphere id="btn-y" x="0.200" y="-0.265" z="0.095" radius="0.030" color="#ccaa00"></m-sphere>

    <!-- START / SELECT — pill-shaped cubes -->
    <m-cube id="btn-select" x="-0.09" y="-0.43" z="0.085" width="0.14" height="0.044" depth="0.022" color="#6a6a7c"></m-cube>
    <m-cube id="btn-start"  x=" 0.09" y="-0.43" z="0.085" width="0.14" height="0.044" depth="0.022" color="#6a6a7c"></m-cube>

    <!-- L / R SHOULDER BUTTONS (top edge) -->
    <m-cube id="btn-lb" x="-0.285" y="0.665" z="0.052" width="0.150" height="0.065" depth="0.065" color="#4a4a5a"></m-cube>
    <m-cube id="btn-rb" x=" 0.285" y="0.665" z="0.052" width="0.150" height="0.065" depth="0.065" color="#4a4a5a"></m-cube>
    <!-- LT / RT sit slightly recessed behind LB/RB -->
    <m-cube id="btn-lt" x="-0.285" y="0.645" z="0.025" width="0.150" height="0.050" depth="0.080" color="#3a3a4a"></m-cube>
    <m-cube id="btn-rt" x=" 0.285" y="0.645" z="0.025" width="0.150" height="0.050" depth="0.080" color="#3a3a4a"></m-cube>

    <!-- ANALOG STICKS — drift in X/Y on axis input -->
    <m-sphere id="btn-ls" x="-0.18" y="-0.32" z="0.082" radius="0.042" color="#3a3a4a"></m-sphere>
    <m-sphere id="btn-rs" x=" 0.14" y="-0.38" z="0.082" radius="0.042" color="#3a3a4a"></m-sphere>

    <!-- CARTRIDGE SLOT (top edge) -->
    <m-cube x="0" y="0.638" z="0.010" width="0.32" height="0.040" depth="0.092" color="#222228"></m-cube>

    <!-- POWER LED — emissive red -->
    <m-sphere x="-0.28" y="0.52" z="0.082" radius="0.018" color="#ff1111" emissive="#cc0000"></m-sphere>

    <!-- USB-C PORT (bottom edge) -->
    <m-cube x="0" y="-0.648" z="0.010" width="0.055" height="0.012" depth="0.055" color="#333340"></m-cube>

  </m-group>

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONFIG
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var ROM_FILE = "PokemonInsurgence";
    var ROM_CORE = "wine";
    var ROM_ID = "pokemon-insurgence";
    var ROM_TITLE = "Pokemon Insurgence";
    var ROM_PREVIEW = "PLACEHOLDER_IMAGE_URL_A";

    var SNES_SERVER_WS = "wss://arcade2-production.up.railway.app";
    var BACKEND_SERVER = "https://gamer-production.up.railway.app";
    var WALLET = "anonymous";

    function set(id, attr, val) {
      var e = document.getElementById(id);
      if (e) e.setAttribute(attr, val);
    }

    var socket = null,
      gameActive = false,
      pollingActive = false;
    var audioEl = null,
      mediaSource = null,
      sourceBuffer = null;
    var audioChunkQueue = [],
      sbReady = false,
      audioInitialized = false;

    function initAudio() {
      if (audioInitialized) return;
      audioInitialized = true;
      try {
        if (!window.MediaSource) return;
        audioEl = new Audio();
        audioEl.autoplay = true;
        mediaSource = new MediaSource();
        audioEl.src = URL.createObjectURL(mediaSource);
        mediaSource.addEventListener("sourceopen", function () {
          try {
            sourceBuffer = mediaSource.addSourceBuffer('audio/webm; codecs="opus"');
            sourceBuffer.mode = "sequence";
            sbReady = true;
            flushAudioQueue();
          } catch (e) {}
        });
      } catch (e) {}
    }

    var MAX_AUDIO_QUEUE = 3;

    function flushAudioQueue() {
      if (!sbReady || !sourceBuffer || sourceBuffer.updating || audioChunkQueue.length === 0) return;
      while (audioChunkQueue.length > MAX_AUDIO_QUEUE) audioChunkQueue.shift();
      var chunk = audioChunkQueue.shift();
      try {
        sourceBuffer.appendBuffer(chunk);
      } catch (e) {
        audioChunkQueue = [];
        return;
      }
      sourceBuffer.addEventListener("updateend", function onUpdate() {
        sourceBuffer.removeEventListener("updateend", onUpdate);
        flushAudioQueue();
      });
    }

    function playAudioChunk(base64Data) {
      if (!audioEl || !mediaSource) return;
      try {
        var binary = atob(base64Data);
        var buf = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
        audioChunkQueue.push(buf.buffer);
        flushAudioQueue();
      } catch (e) {}
    }

    function unlockAudio() {
      try {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          var ctx = new AudioContext();
          ctx.resume();
        }
      } catch (e) {}
      resumeAudio();
    }

    function resumeAudio() {
      if (!audioInitialized) initAudio();
      if (audioEl && audioEl.paused) audioEl.play().catch(function () {});
    }

    function resetAudio() {
      audioChunkQueue = [];
      sbReady = false;
      audioInitialized = false;
      audioEl = null;
      mediaSource = null;
      sourceBuffer = null;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BUTTON MAP — GBA pocket geometry
    // pressZ = Z value while button is held (pushes inward toward body)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var buttonMap = {
      0:  { id: "btn-a",          color: "#ff5555", pressZ: 0.075 },
      1:  { id: "btn-b",          color: "#44ff88", pressZ: 0.075 },
      2:  { id: "btn-x",          color: "#5588ff", pressZ: 0.075 },
      3:  { id: "btn-y",          color: "#ffee44", pressZ: 0.075 },
      4:  { id: "btn-lb",         color: "#8877ff", pressZ: 0.038 },
      5:  { id: "btn-rb",         color: "#8877ff", pressZ: 0.038 },
      6:  { id: "btn-lt",         color: "#ff8844", pressZ: 0.015 },
      7:  { id: "btn-rt",         color: "#ff8844", pressZ: 0.015 },
      8:  { id: "btn-select",     color: "#aaaaff", pressZ: 0.068 },
      9:  { id: "btn-start",      color: "#aaaaff", pressZ: 0.068 },
      10: { id: "btn-ls",         color: "#66ddff", pressZ: 0.065 },
      11: { id: "btn-rs",         color: "#66ddff", pressZ: 0.065 },
      12: { id: "btn-dpad-up",    color: "#ffffff", pressZ: 0.072 },
      13: { id: "btn-dpad-down",  color: "#ffffff", pressZ: 0.072 },
      14: { id: "btn-dpad-left",  color: "#ffffff", pressZ: 0.072 },
      15: { id: "btn-dpad-right", color: "#ffffff", pressZ: 0.072 }
    };

    var defaultColors = {
      0:  "#cc2222", 1:  "#1aaa5c", 2:  "#2244cc", 3:  "#ccaa00",
      4:  "#4a4a5a", 5:  "#4a4a5a", 6:  "#3a3a4a", 7:  "#3a3a4a",
      8:  "#6a6a7c", 9:  "#6a6a7c", 10: "#3a3a4a", 11: "#3a3a4a",
      12: "#707078", 13: "#707078", 14: "#707078", 15: "#707078"
    };

    var defaultZ = {
      0:  0.095, 1:  0.095, 2:  0.095, 3:  0.095,
      4:  0.052, 5:  0.052, 6:  0.025, 7:  0.025,
      8:  0.085, 9:  0.085, 10: 0.082, 11: 0.082,
      12: 0.090, 13: 0.090, 14: 0.090, 15: 0.090
    };

    // Wine key mapping — matches WINE_KEY_MAP in server-b.js
    var wineKeyMap = {
      0: "a",   1: "b",     2: "x",    3: "y",
      4: "l",   5: "r",
      8: "select", 9: "start",
      12: "up", 13: "down", 14: "left", 15: "right"
    };

    var remapIndex = {
      0: 1,  1: 0,  2: 3,  3: 2,
      4: 4,  5: 5,  6: 6,  7: 7,
      8: 8,  9: 9, 10: 10, 11: 11,
      12: 12, 13: 13, 14: 14, 15: 15
    };

    var buttonStates = {};

    function sendGameInput(key, type) {
      if (!gameActive || !socket || socket.readyState !== 1) return;
      socket.send(JSON.stringify({ type: type, key: key }));
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BUTTON PRESS — animates Z (depth into body) instead of Y
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function setButtonPressed(rawIndex, di, pressed) {
      var map = buttonMap[di];
      if (!map) return;
      var elem = document.getElementById(map.id);
      if (!elem) return;
      if (pressed && !buttonStates[di]) {
        buttonStates[di] = true;
        elem.setAttribute("color", map.color);
        elem.setAttribute("z", map.pressZ);
        var k = wineKeyMap[rawIndex];
        if (k) sendGameInput(k, "keyDown");
      } else if (!pressed && buttonStates[di]) {
        buttonStates[di] = false;
        elem.setAttribute("color", defaultColors[di] || "#707078");
        elem.setAttribute("z", defaultZ[di]);
        var k = wineKeyMap[rawIndex];
        if (k) sendGameInput(k, "keyUp");
      }
    }

    function getBestGamepad() {
      var gps = navigator.getGamepads ? navigator.getGamepads() : [];
      for (var i = 0; i < gps.length; i++)
        if (gps[i] && gps[i].mapping === "standard") return gps[i];
      for (var j = 0; j < gps.length; j++)
        if (gps[j]) return gps[j];
      return null;
    }

    function poll() {
      if (pollingActive) return;
      pollingActive = true;

      function loop() {
        var gp = getBestGamepad();
        if (gp) {
          gp.buttons.forEach(function (btn, rawIndex) {
            var di = remapIndex.hasOwnProperty(rawIndex) ? remapIndex[rawIndex] : rawIndex;
            setButtonPressed(rawIndex, di, btn.pressed || btn.value > 0.5);
          });

          var axisX = gp.axes[0] || 0,
            axisY = gp.axes[1] || 0,
            T = 0.5;
          var ls = document.getElementById("btn-ls");
          var rs = document.getElementById("btn-rs");

          // Analog sticks drift in X/Y (lateral) — correct for front-facing portrait device
          if (ls) {
            ls.setAttribute("x", -0.18 + axisX * 0.03);
            ls.setAttribute("y", -0.32 + axisY * 0.03);
          }
          if (rs) {
            rs.setAttribute("x",  0.14 + (gp.axes[2] || 0) * 0.03);
            rs.setAttribute("y", -0.38 + (gp.axes[3] || 0) * 0.03);
          }

          if (!buttonStates[14] && !buttonStates[15] && !buttonStates[12] && !buttonStates[13]) {
            if (axisX < -T)      sendGameInput("left",  "keyDown");
            else if (axisX > T)  sendGameInput("right", "keyDown");
            else {
              sendGameInput("left",  "keyUp");
              sendGameInput("right", "keyUp");
            }
            if (axisY < -T)      sendGameInput("up",   "keyDown");
            else if (axisY > T)  sendGameInput("down", "keyDown");
            else {
              sendGameInput("up",   "keyUp");
              sendGameInput("down", "keyUp");
            }
          }
        }
        requestAnimationFrame(loop);
      }
      loop();
    }

    function connectToServer() {
      var sessionId = Math.random().toString(36).slice(2);
      var wsUrl = SNES_SERVER_WS +
        "?rom="     + encodeURIComponent(ROM_FILE) +
        "&core="    + encodeURIComponent(ROM_CORE) +
        "&id="      + encodeURIComponent(ROM_ID) +
        "&session=" + sessionId +
        "&wallet="  + encodeURIComponent(WALLET);
      socket = new WebSocket(wsUrl);
      socket.onopen = function () {
        set("status-label", "content", "");
      };
      socket.onmessage = function (msg) {
        var frame = JSON.parse(msg.data);
        if (frame.type === "audio" && frame.data) {
          resumeAudio();
          playAudioChunk(frame.data);
          return;
        }
        if (frame.type === "status") {
          set("status-label", "content", frame.message);
          return;
        }
        if (frame.type === "error") {
          set("status-label", "content", "Error: " + frame.message);
          return;
        }
        if (frame.image) {
          set("screen", "src", frame.image);
          set("status-label", "content", "");
          if (!gameActive) {
            gameActive = true;
            set("play-btn", "prompt", "Press E to Close");
            resumeAudio();
          }
        }
      };
      socket.onclose = function () {
        gameActive = false;
        resetAudio();
        set("screen", "src", ROM_PREVIEW);
        set("status-label", "content", "");
        set("play-btn", "prompt", "Press E to Play " + ROM_TITLE);
      };
      socket.onerror = function () {
        set("status-label", "content", "Connection failed");
        socket.close();
      };
    }

    function launchGame() {
      set("status-label", "content", "Launching Pokemon Insurgence...");
      set("play-btn", "prompt", "Launching...");
      connectToServer();
    }

    function closeGame() {
      if (socket) socket.close();
      gameActive = false;
      resetAudio();
    }

    function refreshCompletionCount() {
      fetch(BACKEND_SERVER + "/completions/" + ROM_ID)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var count = data.count || 0;
          set("completion-label", "content", count + " player" + (count !== 1 ? "s" : "") + " completed");
        })
        .catch(function () {});
    }

    setTimeout(function () {
      poll();
      window.addEventListener("gamepadconnected", function () {
        if (!pollingActive) poll();
      });
      var playBtn = document.getElementById("play-btn");
      if (playBtn) playBtn.addEventListener("interact", function () {
        unlockAudio();
        if (gameActive) closeGame();
        else launchGame();
      });
      var probe = document.getElementById("probe");
      if (probe) {
        probe.addEventListener("positionenter", function () {
          set("info-card", "visible", "true");
        });
        probe.addEventListener("positionleave", function () {
          set("info-card", "visible", "false");
          if (gameActive) closeGame();
        });
      }
      refreshCompletionCount();
    }, 500);
  </script>
