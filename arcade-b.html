<m-group>

  <m-label content="T. Takemoto" y="2.3" z="0.42" width="1.0" height="0.1" font-size="8" color="#ffcc00" alignment="center"></m-label>
  <m-cube width="1.15" height="0.03" depth="0.1" y="2.62" z="0.3" color="#ffcc00"></m-cube>
  <m-cube width="1.15" height="0.03" depth="0.1" y="2.22" z="0.3" color="#ffcc00"></m-cube>
  <m-cube width="0.05" height="2.2" depth="0.8" y="1.1" x="-0.625" color="#1a0505"></m-cube>
  <m-cube width="0.05" height="2.2" depth="0.8" y="1.1" x="0.625" color="#1a0505"></m-cube>
  <m-cube width="1.1" height="0.15" depth="0.5" y="0.95" z="0.15" rx="-20" color="#200808"></m-cube>

  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.22" color="#ffcc00"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="0.05" x="0.34" color="#0044ff"></m-sphere>
  <m-sphere radius="0.045" y="1.07" z="-0.05" x="0.22" color="#00aa44"></m-sphere>
  <m-cube width="0.1" height="0.02" depth="0.02" y="1.45" z="0.42" color="#330000"></m-cube>
  <m-cube width="0.15" height="0.25" depth="0.02" y="1.3" z="0.42" x="-0.3" color="#150000"></m-cube>
  <m-cube width="0.15" height="0.25" depth="0.02" y="1.3" z="0.42" x="0.3" color="#150000"></m-cube>
  <m-cube width="1.3" height="0.08" depth="0.9" y="0.04" color="#1a0505"></m-cube>
  <m-label content="EXPERT" y="0.65" z="0.42" width="0.9" height="0.1" font-size="10" color="#ff4400" alignment="center"></m-label>
  <m-label id="completion-label" content="0 players completed" y="0.52" z="0.42" width="0.9" height="0.1" font-size="10" color="#aaaaff" alignment="center"></m-label>
  <m-label id="status-label" content="" y="0.38" z="0.42" width="0.85" height="0.12" font-size="11" color="#ffff00" alignment="center"></m-label>

  <m-image
    id="info-card"
    src="https://jdunk4.github.io/ARCADE1/KMW1%20-%20Info%20Card.png"
    width="1.4" height="1.0"
    x="1.4" y="1.5" z="0.46"
    ry="-15"
    visible="false">
  </m-image>

  <m-position-probe range="4.0" id="probe"></m-position-probe>
  <m-interaction id="play-btn" prompt="Press E to Play Kaizo Mario World" range="4.0" y="1.1"></m-interaction>

  <!-- 3D Controller -->
  <m-group id="controller-root" y="0.9" z="0.85">
    <m-label content="🎮 CONTROLLER" y="0.32" font-size="12" color="#ffcc00" alignment="center"></m-label>
    <m-cube width="0.9" height="0.18" depth="0.42" color="#1a0505" rx="8"></m-cube>
    <m-cube x="-0.38" y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <m-cube x="0.38" y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <m-cube id="btn-dpad-up"    x="-0.3"  y="0.095" z="-0.04" width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-down"  x="-0.3"  y="0.095" z="0.06"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-left"  x="-0.36" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-right" x="-0.24" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-sphere id="btn-a" x="0.36" y="0.11" z="0.0"   radius="0.038" color="#cc2222"></m-sphere>
    <m-sphere id="btn-b" x="0.30" y="0.11" z="0.06"  radius="0.038" color="#1aaa5c"></m-sphere>
    <m-sphere id="btn-x" x="0.3"  y="0.11" z="-0.06" radius="0.038" color="#2244cc"></m-sphere>
    <m-sphere id="btn-y" x="0.24" y="0.11" z="0.0"   radius="0.038" color="#ccaa00"></m-sphere>
    <m-cube id="btn-lb" x="-0.38" y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-rb" x="0.38"  y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-lt" x="-0.38" y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <m-cube id="btn-rt" x="0.38"  y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <m-sphere id="btn-select" x="-0.1" y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <m-sphere id="btn-start"  x="0.1"  y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <m-sphere id="btn-ls" x="-0.18" y="0.1" z="0.06" radius="0.055" color="#2a2a4a"></m-sphere>
    <m-sphere id="btn-rs" x="0.18"  y="0.1" z="0.08" radius="0.055" color="#2a2a4a"></m-sphere>
    <m-label id="ctrl-status" content="Connect controller then press E" y="-0.28" font-size="9" color="#aaaaff" alignment="center"></m-label>
  </m-group>

  <script>
    var SNES_SERVER_WS = "wss://arcade2-production.up.railway.app";
    var BACKEND_SERVER = "https://gamer-production.up.railway.app";
    var ROM_ID         = "kaizo-mario-world-1";
    var WALLET         = "anonymous";

    // ── NO cached element variables at the top.
    // All DOM lookups happen at call time via set() so elements
    // are guaranteed to exist by then.
    function set(id, attr, val) {
      var e = document.getElementById(id);
      if (e) e.setAttribute(attr, val);
    }

    var socket             = null;
    var gameActive         = false;
    var controllerConnected = false;
    var audioCtx           = null;
    var nextAudioTime      = 0;

    // ── Audio — only initialized after a real user gesture ────────────────
    function resumeAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
      } catch (e) {}
    }

    function playAudioChunk(base64Data) {
      if (!audioCtx) return;
      try {
        var binary = atob(base64Data);
        var buf = new ArrayBuffer(binary.length);
        var view = new Uint8Array(buf);
        for (var i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
        audioCtx.decodeAudioData(buf, function(decoded) {
          var src = audioCtx.createBufferSource();
          src.buffer = decoded;
          src.connect(audioCtx.destination);
          var startAt = Math.max(audioCtx.currentTime, nextAudioTime);
          src.start(startAt);
          nextAudioTime = startAt + decoded.duration;
        }, function() {});
      } catch (e) {}
    }

    // ── Controller ────────────────────────────────────────────────────────
    var gamepadToSNES = {
      0: "b", 1: "a", 2: "y", 3: "x",
      4: "l", 5: "r",
      8: "select", 9: "start",
      12: "up", 13: "down", 14: "left", 15: "right"
    };

    var buttonMap = {
      0:  { id: "btn-a",          color: "#ff5555", pressY: 0.095 },
      1:  { id: "btn-b",          color: "#44ff88", pressY: 0.095 },
      2:  { id: "btn-x",          color: "#5588ff", pressY: 0.095 },
      3:  { id: "btn-y",          color: "#ffee44", pressY: 0.095 },
      4:  { id: "btn-lb",         color: "#8877ff", pressY: 0.10  },
      5:  { id: "btn-rb",         color: "#8877ff", pressY: 0.10  },
      6:  { id: "btn-lt",         color: "#ff8844", pressY: 0.14  },
      7:  { id: "btn-rt",         color: "#ff8844", pressY: 0.14  },
      8:  { id: "btn-select",     color: "#aaaaff", pressY: 0.085 },
      9:  { id: "btn-start",      color: "#aaaaff", pressY: 0.085 },
      10: { id: "btn-ls",         color: "#66ddff", pressY: 0.085 },
      11: { id: "btn-rs",         color: "#66ddff", pressY: 0.085 },
      12: { id: "btn-dpad-up",    color: "#ffffff", pressY: 0.08  },
      13: { id: "btn-dpad-down",  color: "#ffffff", pressY: 0.08  },
      14: { id: "btn-dpad-left",  color: "#ffffff", pressY: 0.08  },
      15: { id: "btn-dpad-right", color: "#ffffff", pressY: 0.08  }
    };

    var defaultColors = {
      0: "#cc2222", 1: "#1aaa5c", 2: "#2244cc", 3: "#ccaa00",
      4: "#2a2a4a", 5: "#2a2a4a", 6: "#2a2a4a", 7: "#2a2a4a",
      8: "#3a3a5c", 9: "#3a3a5c", 10: "#2a2a4a", 11: "#2a2a4a",
      12: "#3a3a5c", 13: "#3a3a5c", 14: "#3a3a5c", 15: "#3a3a5c"
    };

    var defaultY = {
      0: 0.11, 1: 0.11, 2: 0.11, 3: 0.11,
      4: 0.12, 5: 0.12, 6: 0.16, 7: 0.16,
      8: 0.1,  9: 0.1,  10: 0.1, 11: 0.1,
      12: 0.095, 13: 0.095, 14: 0.095, 15: 0.095
    };

    var remapIndex = {
      0: 1, 1: 0, 2: 3, 3: 2,
      4: 4, 5: 5, 6: 6, 7: 7,
      8: 8, 9: 9, 10: 10, 11: 11,
      12: 12, 13: 13, 14: 14, 15: 15
    };

    var buttonStates = {};

    function sendGameInput(key, type) {
      if (!gameActive || !socket || socket.readyState !== 1) return;
      socket.send(JSON.stringify({ type: type, key: key }));
    }

    function setButtonPressed(rawIndex, displayIndex, pressed) {
      var map = buttonMap[displayIndex];
      if (!map) return;
      var elem = document.getElementById(map.id);
      if (!elem) return;
      if (pressed && !buttonStates[displayIndex]) {
        buttonStates[displayIndex] = true;
        elem.setAttribute("color", map.color);
        elem.setAttribute("y", map.pressY);
        var snesKey = gamepadToSNES[rawIndex];
        if (snesKey) sendGameInput(snesKey, "keyDown");
      } else if (!pressed && buttonStates[displayIndex]) {
        buttonStates[displayIndex] = false;
        elem.setAttribute("color", defaultColors[displayIndex] || "#3a3a5c");
        elem.setAttribute("y", defaultY[displayIndex]);
        var snesKey = gamepadToSNES[rawIndex];
        if (snesKey) sendGameInput(snesKey, "keyUp");
      }
    }

    function getBestGamepad() {
      var gps = navigator.getGamepads ? navigator.getGamepads() : [];
      for (var i = 0; i < gps.length; i++) {
        if (gps[i] && gps[i].mapping === "standard") return gps[i];
      }
      for (var j = 0; j < gps.length; j++) {
        if (gps[j]) return gps[j];
      }
      return null;
    }

    function poll() {
      var gp = getBestGamepad();
      if (gp) {
        if (!controllerConnected) {
          controllerConnected = true;
          set("ctrl-status", "content", "Controller ready! Press E to start.");
          resumeAudio();
        }
        gp.buttons.forEach(function(btn, rawIndex) {
          var displayIndex = remapIndex.hasOwnProperty(rawIndex) ? remapIndex[rawIndex] : rawIndex;
          var pressed = btn.pressed || btn.value > 0.5;
          setButtonPressed(rawIndex, displayIndex, pressed);
        });
        var axisX = gp.axes[0] || 0;
        var axisY = gp.axes[1] || 0;
        var threshold = 0.5;
        var ls = document.getElementById("btn-ls");
        var rs = document.getElementById("btn-rs");
        if (ls) { ls.setAttribute("x", -0.18 + axisX * 0.04); ls.setAttribute("z", 0.06 + axisY * 0.04); }
        if (rs) { rs.setAttribute("x", 0.18 + (gp.axes[2]||0) * 0.04); rs.setAttribute("z", 0.08 + (gp.axes[3]||0) * 0.04); }
        if (!buttonStates[14] && !buttonStates[15] && !buttonStates[12] && !buttonStates[13]) {
          if (axisX < -threshold) sendGameInput("left", "keyDown");
          else if (axisX > threshold) sendGameInput("right", "keyDown");
          else { sendGameInput("left", "keyUp"); sendGameInput("right", "keyUp"); }
          if (axisY < -threshold) sendGameInput("up", "keyDown");
          else if (axisY > threshold) sendGameInput("down", "keyDown");
          else { sendGameInput("up", "keyUp"); sendGameInput("down", "keyUp"); }
        }
      }
      requestAnimationFrame(poll);
    }

    // ── Defer everything that touches the DOM until elements exist ────────
    // MML renders elements asynchronously — wait 500ms before wiring events
    setTimeout(function() {

      poll();
      window.addEventListener("gamepadconnected", function() { poll(); });

      var playBtn = document.getElementById("play-btn");
      if (playBtn) {
        playBtn.addEventListener("interact", function() {
          resumeAudio();
          if (gameActive) { closeGame(); } else { launchGame(); }
        });
      }

      var probe = document.getElementById("probe");
      if (probe) {
        probe.addEventListener("positionenter", function() {
          set("info-card", "visible", "true");
        });
        probe.addEventListener("positionleave", function() {
          set("info-card", "visible", "false");
          if (gameActive) closeGame();
        });
      }

      refreshCompletionCount();

    }, 500);

    // ── WebSocket ─────────────────────────────────────────────────────────
    function connectToServer() {
      socket = new WebSocket(SNES_SERVER_WS + "?rom=" + ROM_ID + "&wallet=" + WALLET);

      socket.onopen = function() {
        set("ctrl-status", "content",
          controllerConnected ? "Controller ready — play!" : "No controller detected");
      };

      socket.onmessage = function(msg) {
        var frame = JSON.parse(msg.data);
        if (frame.type === "audio" && frame.data) { playAudioChunk(frame.data); return; }
        if (frame.type === "status") { set("status-label", "content", frame.message); return; }
        if (frame.type === "error")  { set("status-label", "content", "Error: " + frame.message); return; }
        if (frame.image) {
          set("screen", "src", frame.image);
          set("status-label", "content", "");
          if (!gameActive) {
            gameActive = true;
            set("play-btn", "prompt", "Press E to Close");
            resumeAudio();
          }
        }
        if (frame.type === "completion") { logCompletion(); }
      };

      socket.onclose = function() {
        gameActive = false;
        nextAudioTime = 0;
        set("screen", "src", "https://jdunk4.github.io/ARCADE1/SMW%20-%20Kaizo%20Mario%20World%201.png");
        set("status-label", "content", "");
        set("play-btn", "prompt", "Press E to Play Kaizo Mario World");
      };

      socket.onerror = function() {
        set("status-label", "content", "Connection failed");
        socket.close();
      };
    }

    function launchGame() {
      set("status-label", "content", "Launching emulator...");
      set("play-btn", "prompt", "Launching...");
      nextAudioTime = 0;
      connectToServer();
    }

    function closeGame() {
      if (socket) socket.close();
      gameActive = false;
      nextAudioTime = 0;
    }

    function logCompletion() {
      fetch(BACKEND_SERVER + "/complete", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wallet: WALLET, rom: ROM_ID })
      }).then(function() { refreshCompletionCount(); }).catch(function() {});
    }

    function refreshCompletionCount() {
      fetch(BACKEND_SERVER + "/completions/" + ROM_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var count = data.count || 0;
          set("completion-label", "content", count + " player" + (count !== 1 ? "s" : "") + " completed");
        }).catch(function() {});
    }

  </script>

</m-group>
