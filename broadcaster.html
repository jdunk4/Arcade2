<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SNES9x Broadcaster</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a; color: #eee; font-family: monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 16px; min-height: 100vh;
  }
  h1 { font-size: 20px; color: #FFD700; letter-spacing: 0.05em; }
  .card {
    background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
    padding: 16px 20px; width: 100%; max-width: 600px;
  }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
  input {
    width: 100%; padding: 8px 10px; background: #111; border: 1px solid #444;
    border-radius: 6px; color: #eee; font-family: monospace; font-size: 13px;
  }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row > div { flex: 1; }
  button {
    padding: 10px 20px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: bold; cursor: pointer; transition: opacity 0.15s;
  }
  #start-btn { background: #22cc66; color: #000; width: 100%; margin-top: 12px; }
  #stop-btn  { background: #cc2222; color: #fff; width: 100%; margin-top: 8px; display: none; }
  #status {
    font-size: 13px; padding: 10px 14px; border-radius: 8px; background: #111;
    border: 1px solid #333; width: 100%; max-width: 600px; min-height: 40px; color: #aaffaa;
  }
  #status.error { color: #ff6666; }
  #status.warn  { color: #ffcc44; }
  #preview-wrap {
    width: 100%; max-width: 600px; background: #000; border: 1px solid #333;
    border-radius: 8px; overflow: hidden; display: none; position: relative;
  }
  #preview { width: 100%; display: block; }
  #stats {
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.75);
    color: #FFD700; font-size: 11px; padding: 4px 10px; border-radius: 20px;
  }
  canvas { display: none; }
  .hint { font-size: 11px; color: #555; text-align: center; max-width: 600px; line-height: 1.6; }
</style>
</head>
<body>

<h1>🎮 SNES9x → OtherSide Broadcaster</h1>

<div class="card">
  <div class="row">
    <div>
      <label>Railway Server URL (wss://)</label>
      <input id="server-url" type="text"
        value="wss://arcade2-production.up.railway.app"
        placeholder="wss://your-server.up.railway.app">
    </div>
    <div>
      <label>Channel ID</label>
      <input id="channel-id" type="text" value="snes-live" placeholder="snes-live">
    </div>
  </div>
  <div style="margin-top:10px; display:flex; gap:16px; align-items:flex-end">
    <div>
      <label>FPS</label>
      <input id="fps" type="number" value="15" min="5" max="30" style="width:70px">
    </div>
    <div>
      <label>JPEG Quality (0.1-1.0)</label>
      <input id="quality" type="number" value="0.5" min="0.1" max="1.0" step="0.1" style="width:80px">
    </div>
    <div>
      <label>Max Width (px)</label>
      <input id="maxwidth" type="number" value="480" min="160" max="640" step="80" style="width:80px">
    </div>
  </div>
  <button id="start-btn" onclick="startBroadcast()">▶ Start Broadcasting</button>
  <button id="stop-btn"  onclick="stopBroadcast()">■ Stop Broadcasting</button>
</div>

<div id="status">Ready — click Start Broadcasting to begin.</div>

<div id="preview-wrap">
  <img id="preview" alt="Live preview">
  <div id="stats">0 viewers • 0 fps</div>
</div>

<canvas id="capture-canvas"></canvas>

<p class="hint">
  Select your SNES9x window and check <strong>"Also share system audio"</strong>.<br>
  Lower quality + lower width = smoother delivery in OtherSide.
</p>

<script>
  var socket         = null;
  var mediaStream    = null;
  var captureLoop    = null;
  var audioCtx       = null;
  var audioProcessor = null;
  var audioSource    = null;
  var hasAudio       = false;

  // Frame rate tracking
  var framesSent  = 0;
  var fpsDisplay  = 0;
  var lastFpsTick = Date.now();

  var videoEl = document.createElement("video");
  videoEl.autoplay = true;
  videoEl.muted    = true;
  videoEl.playsInline = true;

  var canvas  = document.getElementById("capture-canvas");
  var ctx2d   = canvas.getContext("2d");
  var preview = document.getElementById("preview");
  var stats   = document.getElementById("stats");

  function setStatus(msg, type) {
    var el = document.getElementById("status");
    el.textContent = msg;
    el.className = type || "";
  }

  // Update fps counter every second
  setInterval(function() {
    fpsDisplay  = framesSent;
    framesSent  = 0;
    var viewers = stats.textContent.match(/(\d+) viewer/);
    var v = viewers ? viewers[1] : "0";
    stats.textContent = v + " viewer" + (v !== "1" ? "s" : "") + " • " + fpsDisplay + " fps";
  }, 1000);

  async function startBroadcast() {
    var serverUrl = document.getElementById("server-url").value.trim();
    var channelId = document.getElementById("channel-id").value.trim();
    var fps       = parseInt(document.getElementById("fps").value)     || 15;
    var quality   = parseFloat(document.getElementById("quality").value) || 0.5;
    var maxWidth  = parseInt(document.getElementById("maxwidth").value) || 480;

    setStatus("Requesting screen capture...", "warn");
    try {
      mediaStream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: fps },
        audio: true
      });
    } catch(e) {
      setStatus("Cancelled: " + e.message, "error");
      return;
    }

    hasAudio = mediaStream.getAudioTracks().length > 0;
    console.log("[broadcaster] audio:", hasAudio);

    // Attach video
    try {
      await new Promise(function(resolve) {
        videoEl.onloadedmetadata = resolve;
        try { videoEl.srcObject = mediaStream; }
        catch(e) { videoEl.src = URL.createObjectURL(mediaStream); resolve(); }
        setTimeout(resolve, 2500);
      });
      try { await videoEl.play(); } catch(e) {}
    } catch(e) {
      setStatus("Video attach failed: " + e.message, "error");
      cleanup(); return;
    }

    // Connect WebSocket
    setStatus("Connecting...", "warn");
    socket = new WebSocket(serverUrl + "?mode=broadcast&channel=" + encodeURIComponent(channelId));

    socket.onopen = function() {
      setStatus("✅ Broadcasting" + (hasAudio ? " (video + audio)" : " (video only)"));
      document.getElementById("start-btn").style.display = "none";
      document.getElementById("stop-btn").style.display  = "block";
      document.getElementById("preview-wrap").style.display = "block";
      startVideo(fps, quality, maxWidth);
      if (hasAudio) startAudio();
    };

    socket.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.type === "viewerCount") {
          stats.textContent = msg.count + " viewer" + (msg.count !== 1 ? "s" : "") + " • " + fpsDisplay + " fps";
        }
      } catch(ex) {}
    };

    socket.onclose = function() {
      setStatus("Disconnected.", "warn");
      cleanup();
      document.getElementById("start-btn").style.display = "block";
      document.getElementById("stop-btn").style.display  = "none";
      document.getElementById("preview-wrap").style.display = "none";
    };

    socket.onerror = function() { setStatus("WebSocket error.", "error"); };
    mediaStream.getVideoTracks()[0].onended = function() { stopBroadcast(); };
  }

  function startVideo(fps, quality, maxWidth) {
    var INTERVAL = 1000 / fps;
    var sending  = false;

    captureLoop = setInterval(function() {
      if (sending) return;
      if (!socket || socket.readyState !== 1) return;
      if (!videoEl.videoWidth) return;

      sending = true;

      var w = Math.min(videoEl.videoWidth, maxWidth);
      var h = Math.round(videoEl.videoHeight * (w / videoEl.videoWidth));
      canvas.width  = w;
      canvas.height = h;

      try { ctx2d.drawImage(videoEl, 0, 0, w, h); }
      catch(e) { sending = false; return; }

      // Update local preview (lower quality for speed)
      preview.src = canvas.toDataURL("image/jpeg", 0.4);

      // Use toDataURL directly — faster than Blob+FileReader pipeline
      var dataUrl = canvas.toDataURL("image/jpeg", quality);
      if (socket && socket.readyState === 1) {
        try {
          socket.send(JSON.stringify({ image: dataUrl }));
          framesSent++;
        } catch(e) {}
      }
      sending = false;

    }, INTERVAL);
  }

  function startAudio() {
    try {
      audioCtx      = new (window.AudioContext || window.webkitAudioContext)();
      audioSource   = audioCtx.createMediaStreamSource(mediaStream);
      audioProcessor = audioCtx.createScriptProcessor(4096, 1, 1);

      audioSource.connect(audioProcessor);
      audioProcessor.connect(audioCtx.destination);

      audioProcessor.onaudioprocess = function(e) {
        if (!socket || socket.readyState !== 1) return;
        var input  = e.inputBuffer.getChannelData(0);
        var pcm16  = new Int16Array(input.length);
        for (var i = 0; i < input.length; i++) {
          var s = Math.max(-1, Math.min(1, input[i]));
          pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        var bytes  = new Uint8Array(pcm16.buffer);
        var binary = "";
        for (var j = 0; j < bytes.byteLength; j++) binary += String.fromCharCode(bytes[j]);
        try {
          socket.send(JSON.stringify({
            type: "audio", data: btoa(binary),
            sampleRate: audioCtx.sampleRate, channels: 1
          }));
        } catch(err) {}
      };
    } catch(e) {
      console.warn("[broadcaster] audio failed:", e.message);
    }
  }

  function stopBroadcast() {
    cleanup();
    setStatus("Broadcast stopped.");
    document.getElementById("start-btn").style.display = "block";
    document.getElementById("stop-btn").style.display  = "none";
    document.getElementById("preview-wrap").style.display = "none";
  }

  function cleanup() {
    if (captureLoop)    { clearInterval(captureLoop); captureLoop = null; }
    if (audioProcessor) { try { audioProcessor.disconnect(); } catch(e) {} audioProcessor = null; }
    if (audioSource)    { try { audioSource.disconnect(); } catch(e) {} audioSource = null; }
    if (audioCtx)       { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
    if (socket)         { try { socket.close(); } catch(e) {} socket = null; }
    if (mediaStream)    { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
    try { videoEl.srcObject = null; } catch(e) {}
    hasAudio = false;
  }
</script>
</body>
</html>
